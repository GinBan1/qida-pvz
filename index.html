<style>
*,::after,::before{margin:0;padding:0;box-sizing:border-box}
:root{--bgp:#0a0e1a;--gb:rgba(255,255,255,.1);--gs:0 8px 32px rgba(0,0,0,.4);--t1:#fff;--t2:rgba(255,255,255,.7);--gn:#4ade80;--bu:#60a5fa;--re:#f87171;--sn:#fbbf24;--pu:#a78bfa}
html,body{width:100%;height:100%;overflow:hidden;font-family:"Microsoft YaHei","PingFang SC","Hiragino Sans GB",sans-serif;background:var(--bgp);color:var(--t1);user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:manipulation}
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;transition:opacity .5s}.screen.hidden{display:none}
#start-screen{background:linear-gradient(135deg,#0a0e1a,#1a1a2e 30%,#16213e 60%,#0f3460);background-size:400% 400%;animation:gs 8s ease infinite}
@keyframes gs{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.sc{display:flex;flex-direction:column;align-items:center;gap:clamp(1rem,4vw,2rem);padding:clamp(1.5rem,5vw,3rem);background:var(--gb);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:24px;border:1px solid var(--gb);box-shadow:var(--gs);max-width:520px;width:92%;animation:fi .8s ease}.ec{max-width:400px;gap:1.5rem}.slc{gap:1.2rem}
@keyframes fi{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.gt{font-size:clamp(1.3rem,5vw,2rem);font-weight:900;background:linear-gradient(135deg,#4ade80,#22c55e,#16a34a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;line-height:1.3;text-align:center}
.st{font-size:clamp(.7rem,2.5vw,.85rem);color:var(--t2);text-align:center;margin-top:.5rem;letter-spacing:4px}
.btn{padding:clamp(.6rem,2.5vw,1rem) clamp(1.5rem,6vw,3rem);font-size:clamp(.9rem,3.5vw,1.25rem);font-weight:700;font-family:inherit;border:none;border-radius:16px;background:linear-gradient(135deg,var(--gn),#22c55e);color:#fff;cursor:pointer;transition:all .3s;box-shadow:0 0 20px rgba(74,222,128,.3);position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.1),transparent 60%);opacity:0;transition:opacity .3s}
.btn:active{transform:scale(.96)}.btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 0 40px rgba(74,222,128,.5)}.btn:hover::before{opacity:1}
.bs{padding:.5rem 1.2rem;font-size:clamp(.75rem,3vw,.9rem)}.bg{background:rgba(255,255,255,.1);box-shadow:none}
.zw{animation:zb 1.5s ease-in-out infinite;display:inline-block;font-size:clamp(1.5rem,6vw,2.5rem)}
.zw.d1{animation-delay:.3s}.zw.d2{animation-delay:.6s}

.lb{display:flex;align-items:center;gap:clamp(.5rem,2vw,1rem);padding:clamp(.5rem,2vw,.8rem) clamp(.8rem,3vw,1.2rem);border-radius:14px;border:1px solid var(--gb);background:rgba(255,255,255,.04);cursor:pointer;transition:all .2s;text-align:left;width:100%;font-family:inherit;color:var(--t1)}
.lb:active{background:rgba(255,255,255,.1);transform:translateX(4px)}.lb .li{font-size:clamp(1rem,4vw,1.6rem)}.lb .li2{flex:1}
.lb .ln{font-size:clamp(.8rem,3vw,1rem);font-weight:700}.lb .ld{font-size:clamp(.65rem,2.5vw,.75rem);color:var(--t2);margin-top:2px}

.le .ldf{background:rgba(74,222,128,.2);color:var(--gn)}.lm .ldf{background:rgba(251,191,36,.2);color:#fbbf24}
.lh .ldf{background:rgba(248,113,113,.2);color:var(--re)}.llk{opacity:.4;pointer-events:none}
.llk .ldf{background:rgba(255,255,255,.1);color:var(--t2)}.ec p{color:var(--t2);font-size:clamp(.85rem,3vw,1.1rem)}
.wt{font-size:clamp(1.5rem,6vw,2.5rem);background:linear-gradient(135deg,#fbbf24,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lt{font-size:clamp(1.2rem,5vw,2rem);background:linear-gradient(135deg,#f87171,#ef4444,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#gs2{display:flex;flex-direction:column;align-items:center;height:100dvh;height:100vh;padding:clamp(2px,.8vh,5px);background:var(--bgp);gap:clamp(2px,.6vh,5px)}#gs2.hidden{display:none}

.pc{flex:1;min-width:clamp(44px,12vw,70px);display:flex;flex-direction:column;align-items:center;gap:1px;padding:clamp(3px,.5vh,6px) 2px;background:rgba(255,255,255,.06);border-radius:8px;border:2px solid transparent;cursor:pointer;transition:all .15s;position:relative}
.pc:active{transform:scale(.95)}.pc.act{border-color:var(--gn);background:rgba(74,222,128,.1);box-shadow:0 0 12px rgba(74,222,128,.2)}
.pc.dis{opacity:.4;pointer-events:none;filter:grayscale(.8)}
.pi{font-size:clamp(1rem,4vw,1.5rem);line-height:1}
.pn{font-size:clamp(.5rem,2vw,.7rem);font-weight:600;color:var(--t2);white-space:nowrap}
.pp{font-size:clamp(.45rem,1.8vw,.65rem);font-weight:700;color:var(--sn)}
.co{position:absolute;inset:0;background:rgba(0,0,0,.6);border-radius:6px;display:none;align-items:center;justify-content:center;font-size:clamp(.55rem,2vw,.75rem);font-weight:700;color:var(--t1)}
.oc .co{display:flex}
#gc{position:relative;border-radius:clamp(8px,1.5vw,16px);overflow:hidden;box-shadow:0 0 30px rgba(0,0,0,.5);border:1px solid var(--gb);flex:1;min-height:0;width:100%;max-width:960px;display:flex;align-items:center;justify-content:center;aspect-ratio:auto}
#cv{display:block;width:100%;height:100%;max-width:900px;max-height:600px;object-fit:contain;image-rendering:pixelated}
#bb{width:100%;max-width:960px;display:flex;justify-content:center;gap:clamp(4px,1vw,8px);padding:clamp(2px,.4vh,4px);flex-shrink:0}
.cb{padding:clamp(4px,1vh,7px) clamp(10px,3vw,16px);font-size:clamp(.65rem,2.5vw,.85rem);font-weight:600;font-family:inherit;border:none;border-radius:8px;background:rgba(255,255,255,.06);color:var(--t2);cursor:pointer;transition:all .15s;border:1px solid var(--gb)}
.cb:active{background:rgba(255,255,255,.12);transform:scale(.95)}
.cb.ac{background:rgba(74,222,128,.15);border-color:var(--gn);color:var(--gn)}
.po{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:10;border-radius:clamp(8px,1.5vw,16px)}
.po.sh{display:flex}.pt{font-size:clamp(1.2rem,5vw,2rem);font-weight:900;text-shadow:0 0 20px rgba(255,255,255,.3);animation:pp 1.5s ease-in-out infinite}
@keyframes pp{0%,100%{opacity:1}50%{opacity:.5}}
@media(max-width:480px){.sc,.slc{padding:1rem;gap:1rem}.gt{font-size:1.1rem}.btn{font-size:.8rem;padding:.5rem 1.2rem;border-radius:12px}.stl{font-size:.9rem}.inst{font-size:.7rem}.lb{padding:.5rem .8rem}.lb .ln{font-size:.75rem}.lb .ld{font-size:.6rem}.lb .ldf{font-size:.55rem}}
</style>

<div id=ss class=screen><div class=sc><div><div class=gt>🌻 齐大植物大战僵尸 🌻</div><div class=st>Qiqihar University Edition</div></div><div><span class=zw>🧟</span><span class="zw d1">🧟</span><span class="zw d2">🧟‍♂️</span></div><button id=sb class=btn>开始游戏</button><div class=inst style="background:rgba(0,0,0,.3);border-radius:12px;padding:clamp(.6rem,2.5vw,1rem);width:100%"><p style="color:var(--t2);font-size:clamp(.7rem,2.5vw,.85rem);padding:.3rem 0">🎮 点击草坪放置植物</p><p style="color:var(--t2);font-size:clamp(.7rem,2.5vw,.85rem);padding:.3rem 0">☀️ 点击阳光收集资源</p><p style="color:var(--t2);font-size:clamp(.7rem,2.5vw,.85rem);padding:.3rem 0">🌊 完成关卡解锁下一关</p></div></div></div>

<script>
if(!CanvasRenderingContext2D.prototype.roundRect)CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(r>w/2)r=w/2;if(r>h/2)r=h/2;this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);return this};
const C={grid:{rows:5,cols:9,cw:100,ch:120,ox:0,oy:0},startSun:50,sun:{skyInt:8e3,sfInt:8e3,val:50,fallSpd:1.5,life:8e3,size:28},pf:{dropInt:12e3,boostDur:5e3,val:1},mowerSpd:6,
plants:{sunflower:{name:'向日葵',cost:50,hp:100,cd:5e3,color:'#facc15',cat:'eco',icon:'🌻'},peashooter:{name:'豌豆射手',cost:100,hp:100,cd:5e3,si:1500,dmg:25,color:'#22c55e',cat:'shooter',icon:'🌱'},wallnut:{name:'坚果墙',cost:50,hp:400,cd:2e4,color:'#a16207',cat:'defense',icon:'🧱'},snowpea:{name:'寒冰射手',cost:175,hp:100,cd:5e3,si:1500,dmg:20,color:'#60a5fa',cat:'shooter',icon:'❄️'},cherrybomb:{name:'樱桃炸弹',cost:150,hp:1,cd:3e4,color:'#ef4444',cat:'instant',dmg:1800,icon:'🍒'},potatomine:{name:'土豆地雷',cost:25,hp:100,cd:2e4,color:'#92400e',cat:'mine',arm:15e3,icon:'🥔'}},
zombies:{normal:{name:'普通僵尸',hp:100,spd:.4,dmg:50,rate:1e3,color:'#6b4c3b'},cone:{name:'路障僵尸',hp:200,spd:.4,dmg:50,rate:1e3,color:'#d97706'},bucket:{name:'铁桶僵尸',hp:500,spd:.3,dmg:50,rate:1e3,color:'#6b7280'},flag:{name:'旗帜僵尸',hp:100,spd:.6,dmg:50,rate:1e3,color:'#8b5cf6'},pole:{name:'撑杆跳僵尸',hp:150,spd:.7,dmg:50,rate:1e3,color:'#f97316'}},
proj:{spd:4,size:8},
levels:[
{id:1,name:'校园草坪',desc:'轻松的白天关卡，熟悉操作',diff:'简单',unlock:true,startSun:100,avail:['sunflower','peashooter','wallnut','cherrybomb'],skyInt:10e3,sfInt:10e3,waveDelay:4e3,waves:[[{t:'normal',r:2,d:0},{t:'normal',r:0,d:2500},{t:'normal',r:4,d:5e3}],[{t:'normal',r:1,d:0},{t:'normal',r:3,d:1500},{t:'flag',r:2,d:3e3},{t:'normal',r:0,d:5e3},{t:'normal',r:4,d:6e3}],[{t:'normal',r:0,d:0},{t:'normal',r:2,d:1e3},{t:'cone',r:4,d:2e3},{t:'flag',r:1,d:3e3},{t:'normal',r:3,d:4500},{t:'cone',r:2,d:6e3}],[{t:'normal',r:0,d:0},{t:'cone',r:1,d:1e3},{t:'normal',r:2,d:2e3},{t:'flag',r:3,d:3e3},{t:'cone',r:4,d:4e3},{t:'normal',r:0,d:5e3},{t:'normal',r:2,d:6e3},{t:'cone',r:4,d:7e3}]]},
{id:2,name:'林荫小道',desc:'僵尸种类增加，小心撑杆跳！',diff:'中等',startSun:75,avail:['sunflower','peashooter','wallnut','snowpea','cherrybomb','potatomine'],skyInt:9e3,sfInt:9e3,waveDelay:3e3,waves:[[{t:'normal',r:2,d:0},{t:'flag',r:0,d:2e3},{t:'cone',r:3,d:4e3},{t:'normal',r:1,d:5500},{t:'normal',r:4,d:7e3}],[{t:'cone',r:0,d:0},{t:'normal',r:2,d:1500},{t:'flag',r:4,d:3e3},{t:'pole',r:1,d:4500},{t:'normal',r:3,d:6e3},{t:'cone',r:2,d:8e3}],[{t:'flag',r:1,d:0},{t:'normal',r:0,d:1e3},{t:'cone',r:2,d:2e3},{t:'pole',r:4,d:3e3},{t:'normal',r:3,d:4e3},{t:'cone',r:1,d:5e3},{t:'pole',r:2,d:6500},{t:'normal',r:4,d:8e3}],[{t:'normal',r:0,d:0},{t:'cone',r:1,d:1e3},{t:'flag',r:2,d:2e3},{t:'pole',r:3,d:3e3},{t:'bucket',r:4,d:4e3},{t:'normal',r:0,d:5e3},{t:'cone',r:2,d:6e3},{t:'pole',r:4,d:7e3},{t:'flag',r:1,d:8500},{t:'normal',r:3,d:1e4}]]},
{id:3,name:'教学楼顶',desc:'终极挑战！全部僵尸登场',diff:'困难',startSun:50,avail:['sunflower','peashooter','wallnut','snowpea','cherrybomb','potatomine'],skyInt:7e3,sfInt:7e3,waveDelay:2500,waves:[[{t:'flag',r:2,d:0},{t:'cone',r:0,d:1500},{t:'normal',r:3,d:3e3},{t:'pole',r:1,d:4500},{t:'bucket',r:4,d:6e3},{t:'normal',r:2,d:8e3}],[{t:'pole',r:0,d:0},{t:'cone',r:2,d:1e3},{t:'flag',r:4,d:2e3},{t:'normal',r:1,d:3e3},{t:'bucket',r:3,d:4e3},{t:'pole',r:0,d:5e3},{t:'cone',r:4,d:6e3},{t:'flag',r:2,d:7500},{t:'bucket',r:1,d:9e3}],[{t:'flag',r:0,d:0},{t:'bucket',r:2,d:1e3},{t:'pole',r:4,d:2e3},{t:'cone',r:1,d:3e3},{t:'normal',r:3,d:4e3},{t:'flag',r:0,d:5e3},{t:'bucket',r:2,d:6e3},{t:'pole',r:4,d:7e3},{t:'cone',r:1,d:8e3},{t:'bucket',r:3,d:9e3},{t:'flag',r:2,d:10500}],[{t:'flag',r:1,d:0},{t:'bucket',r:0,d:1e3},{t:'pole',r:2,d:2e3},{t:'cone',r:3,d:3e3},{t:'bucket',r:4,d:4e3},{t:'flag',r:1,d:5e3},{t:'pole',r:0,d:6e3},{t:'bucket',r:2,d:7e3},{t:'cone',r:4,d:8e3},{t:'normal',r:3,d:9e3},{t:'flag',r:1,d:10500},{t:'bucket',r:2,d:12e3},{t:'pole',r:4,d:13e3}]]}
]};
class Plant{constructor(t,r,c){const d=C.plants[t];this.type=t;this.row=r;this.col=c;this.hp=d.hp;this.maxHp=d.hp;this.lastShoot=0;this.lastSun=0;this.af=0;this.at=0;this.boosted=0;this.armed=0;this.done=false}
get x(){return C.grid.ox+this.col*C.grid.cw+C.grid.cw/2}get y(){return C.grid.oy+this.row*C.grid.ch+C.grid.ch/2}
update(dt,g){this.at+=dt;if(this.at>100){this.af=(this.af+1)%60;this.at=0};if(this.boosted>0)this.boosted=Math.max(0,this.boosted-dt);const d=C.plants[this.type];if(this.type==='sunflower'){if(g.time-this.lastSun>=g.cfg.sfInt){this.lastSun=g.time;g.suns.push(new Sun(this.x,this.y-40,0,g))}}else if(d.cat==='shooter'){const iv=this.boosted>0?d.si*0.5:d.si;if(g.zombies.some(z=>z.row===this.row&&z.x>this.x&&z.hp>0)&&g.time-this.lastShoot>=iv){this.lastShoot=g.time;g.projs.push(new Proj(this.x+20,this.y-4,this.row,this.type==='snowpea'))}}else if(this.type==='potatomine'&&!this.done){if(!this.armed)this.armed+=dt;else this.armed=Math.min(this.armed+dt,C.plants.potatomine.arm);if(this.armed>=C.plants.potatomine.arm){for(const z of g.zombies){if(z.row===this.row&&Math.abs(z.x-this.x)<C.grid.cw/2){z.takeDamage(1e4);this.done=true;g.hitEff.push({x:this.x,y:this.y,t:400,color:'#ef4444',big:true});return}}}}}
draw(c){if(this.done)return;const d=C.plants[this.type];c.save();const gr=c.createRadialGradient(this.x,this.y+15,2,this.x,this.y+15,25);gr.addColorStop(0,d.color+'40');gr.addColorStop(1,d.color+'00');c.fillStyle=gr;c.beginPath();c.arc(this.x,this.y+15,25,0,Math.PI*2);c.fill();const b=Math.sin(this.af*0.15)*2;this.drawBody(c,b,d);if(this.boosted>0){c.strokeStyle='#a78bfa';c.lineWidth=2;c.shadowColor='#a78bfa';c.shadowBlur=10;c.beginPath();c.arc(this.x,this.y,28,0,Math.PI*2);c.stroke();c.shadowBlur=0};c.restore();if(this.hp<this.maxHp&&this.type!=='cherrybomb'&&this.type!=='potatomine'){const bw=50,bh=5,bx=this.x-bw/2,by=this.y-45,r=this.hp/this.maxHp;c.fillStyle='rgba(0,0,0,.5)';c.roundRect(bx,by,bw,bh,3);c.fill();c.fillStyle=r>.5?'#4ade80':r>.25?'#fbbf24':'#f87171';c.roundRect(bx,by,bw*r,bh,3);c.fill()}}

class Sun{constructor(x,y,fs,g){this.x=x;this.y=fs?y:-30;this.targetY=y+(fs>0?80+Math.random()*60:0);this.val=C.sun.val;this.sz=C.sun.size;this.fall=C.sun.fallSpd;this.life=C.sun.life;this.born=g?g.time:0;this.fs=fs;this.collect=false;this.collecting=false;this.cTarget=null;this.cSpd=6;this.active=true;this.pulse=0}

checkTrigger(zombies){if(this.triggered)return;for(const z of zombies){if(z.row===this.row&&!z.dead&&z.x<30){this.triggered=true;return true}};return false}}
class Game{constructor(){this.cv=document.getElementById('cv');this.ctx=this.cv.getContext('2d');this.state='menu';this.reset()}
reset(){this.time=0;this.spd=1;this.sunCount=0;this.curWave=0;this.waveAct=false;this.waveTim=0;this.allDone=false;this.zwAlive=0;this.plants=[];this.zombies=[];this.projs=[];this.suns=[];this.pfItems=[];this.mowers=[];this.hitEff=[];this.pfCount=0;this.pfActive=false;this.grid=Array.from({length:C.grid.rows},()=>Array(C.grid.cols).fill(null));this.selPlant=null;this.cds={};this.skySunTim=0;this.pfTim=0;this.mx=-1;this.my=-1;this.lastF=0;this.reqId=null;this.waveNotif=null;this.cfg=null;this.curLevel=0;this.overlay=null}
init(){const tw=C.grid.cols*C.grid.cw,th=C.grid.rows*C.grid.ch;C.grid.ox=(this.cv.width-tw)/2;C.grid.oy=(this.cv.height-th)/2;this.overlay=document.createElement('div');this.overlay.className='po';this.overlay.innerHTML='<span class=pt>⏸️ 已暂停</span>';document.getElementById('gc').appendChild(this.overlay)}
startLevel(lvIdx){this.reset();this.curLevel=lvIdx;const lv=C.levels[lvIdx];this.cfg=lv;this.state='playing';this.sunCount=lv.startSun;this.time=0;this.curWave=0;this.allDone=false;this.zwAlive=0;this.skySunTim=3e3;this.pfTim=0;this.pfCount=0;this.pfActive=false;this.mowers=[];for(let r=0;r<C.grid.rows;r++)this.mowers.push(new Mower(r));this.buildSel(lv.avail);this.cds={};for(const k of Object.keys(C.plants))this.cds[k]=0;this.waveTim=lv.waveDelay;document.getElementById('ln').textContent='🌻'+lv.name;document.getElementById('pfd').style.display=lvIdx>0?'flex':'none';this.ui();this.clrAct();if(this.reqId)cancelAnimationFrame(this.reqId);this.lastF=performance.now();this.loop(this.lastF)}
loop(ts){if(this.state==='menu')return;const dt=Math.min(ts-this.lastF,50);this.lastF=ts;if(this.state==='playing')this.update(dt*this.spd);this.render();this.reqId=requestAnimationFrame(t=>this.loop(t))}
update(dt){this.time+=dt;this.waveUp(dt);this.skySunTim+=dt;if(this.skySunTim>=this.cfg.skyInt){this.skySunTim=0;this.skySun()};this.pfTim+=dt;if(this.pfTim>=C.pf.dropInt&&this.curLevel>0){this.pfTim=0;this.spPF()};for(const p of this.plants)p.update(dt,this);for(const p of this.projs)p.update(dt,this);this.projs=this.projs.filter(p=>p.active);for(const z of this.zombies)z.update(dt,this);this.zombies=this.zombies.filter(z=>!z.dead);for(const s of this.suns)s.update(dt,this);this.suns=this.suns.filter(s=>s.active);for(const p of this.pfItems)p.update(dt);this.pfItems=this.pfItems.filter(p=>p.active);for(const m of this.mowers){m.checkTrigger(this.zombies);m.update(dt,this)};this.mowers=this.mowers.filter(m=>m.active);for(const e of this.hitEff)e.t-=dt;this.hitEff=this.hitEff.filter(e=>e.t>0);for(const k in this.cds){if(this.cds[k]>0){this.cds[k]-=dt;if(this.cds[k]<0)this.cds[k]=0}};this.zwAlive=this.zombies.length;if(this.allDone&&this.zwAlive===0)this.win();this.ui();this.cards()}
waveUp(dt){if(this.allDone)return;if(!this.waveAct){this.waveTim-=dt;if(this.waveTim<=0)this.goWave();return};const w=this.cfg.waves[this.curWave];let all=true;for(const zd of w){if(!zd._s){all=false;if(this.waveTim>=zd.d){this.zombies.push(new Zombie(zd.t,zd.r,this));zd._s=true}}};this.waveTim+=dt;if(all&&this.zwAlive===0){this.waveAct=false;this.curWave++;if(this.curWave>=this.cfg.waves.length)this.allDone=true;else this.waveTim=this.cfg.waveDelay}}
goWave(){if(this.curWave>=this.cfg.waves.length)return;this.waveAct=true;this.waveTim=0;for(const zd of this.cfg.waves[this.curWave])zd._s=false;this.notif('🌊 第'+(this.curWave+1)+'波 来袭！')}
skySun(){const col=Math.floor(Math.random()*C.grid.cols);this.suns.push(new Sun(C.grid.ox+col*C.grid.cw+C.grid.cw/2+(Math.random()-.5)*60,-20,1,this))}
spPF(){const col=Math.floor(Math.random()*C.grid.cols);const x=C.grid.ox+col*C.grid.cw+C.grid.cw/2;const p=new PF(x,C.grid.oy-20);p.targetY=C.grid.oy+Math.random()*C.grid.rows*C.grid.ch;this.pfItems.push(p)}
placePlant(t,r,c){const d=C.plants[t];if(this.sunCount<d.cost||this.cds[t]>0||this.grid[r][c]!==null)return false;if(this.pfActive&&(t==='peashooter'||t==='snowpea'||t==='sunflower')){this.pfActive=false;const p=new Plant(t,r,c);p.boosted=C.pf.boostDur;this.plants.push(p);this.grid[r][c]=p;this.hitEff.push({x:p.x,y:p.y,t:400,color:'#a78bfa',big:true});document.getElementById('pfc').textContent='0';this.cards();return true};if(d.cat==='instant'&&t==='cherrybomb'){if(this.sunCount<d.cost)return false;this.sunCount-=d.cost;this.cds[t]=d.cd;this.explode(r,c);return true};this.sunCount-=d.cost;const p=new Plant(t,r,c);this.plants.push(p);this.grid[r][c]=p;this.cds[t]=d.cd;this.hitEff.push({x:p.x,y:p.y,t:300,color:d.color});return true}
explode(r,c){const cx=C.grid.ox+c*C.grid.cw+C.grid.cw/2,cy=C.grid.oy+r*C.grid.ch+C.grid.ch/2;this.hitEff.push({x:cx,y:cy,t:500,color:'#ef4444',big:true});this.hitEff.push({x:cx-50,y:cy-50,t:300,color:'#f97316'});this.hitEff.push({x:cx+50,y:cy-50,t:300,color:'#f97316'});this.hitEff.push({x:cx-50,y:cy+50,t:300,color:'#f97316'});this.hitEff.push({x:cx+50,y:cy+50,t:300,color:'#f97316'});for(let dr=-1;dr<=1;dr++){for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr<0||nr>=C.grid.rows||nc<0||nc>=C.grid.cols)continue;for(const z of this.zombies)if(z.row===nr&&!z.dead)z.takeDamage(1e4)}}}
removePlant(p){const i=this.plants.indexOf(p);if(i!==-1){this.plants.splice(i,1);this.grid[p.row][p.col]=null}}
addSun(a){this.sunCount+=a;this.ui()}
lose(){this.state='lose';this.overlay.classList.remove('sh');document.getElementById('gs2').classList.add('hidden');document.getElementById('ls').classList.remove('hidden')}
win(){setTimeout(()=>{this.state='win';this.overlay.classList.remove('sh');document.getElementById('gs2').classList.add('hidden');document.getElementById('ws').classList.remove('hidden');document.getElementById('wm').textContent=this.cfg.name+' 通关！';document.getElementById('nl').style.display=this.curLevel<C.levels.length-1?'inline-block':'none';if(this.curLevel<C.levels.length-1){const d=JSON.parse(localStorage.getItem('pvz_progress')||'{}');d['lv_'+(this.curLevel+1)]=true;localStorage.setItem('pvz_progress',JSON.stringify(d))}},1500)}
render(){const c=this.ctx,{width,height}=this.cv;c.clearRect(0,0,width,height);this.lawn(c);this.gridL(c);this.prog(c);this.prev(c);for(const m of this.mowers)m.draw(c);for(const p of this.plants)p.draw(c);for(const p of this.projs)p.draw(c);for(const z of this.zombies)z.draw(c);for(const s of this.suns)s.draw(c);for(const p of this.pfItems)p.draw(c);this.hit(c);this.nt(c)}
lawn(c){const o=C.grid;const bg=c.createLinearGradient(0,0,0,this.cv.height);bg.addColorStop(0,'#2d5016');bg.addColorStop(.5,'#3a6b1e');bg.addColorStop(1,'#2d5016');c.fillStyle=bg;c.fillRect(0,0,this.cv.width,this.cv.height);for(let r=0;r<o.rows;r++){for(let c2=0;c2<o.cols;c2++){const x=o.ox+c2*o.cw,y=o.oy+r*o.ch,lt=(r+c2)%2===0;c.fillStyle=lt?'#4a8f2c':'#3f7e25';c.fillRect(x,y,o.cw,o.ch);c.fillStyle=lt?'rgba(255,255,255,.03)':'rgba(0,0,0,.03)';const sd=(r*7+c2*11)%5;for(let i=0;i<sd;i++)c.beginPath(),c.arc(x+15+(i*23+r*7)%(o.cw-30),y+15+(i*17+c2*11)%(o.ch-30),2,0,Math.PI*2),c.fill()}};c.fillStyle='#5c4033';c.fillRect(0,o.oy-4,this.cv.width,4);c.fillRect(0,o.oy+o.rows*o.ch,this.cv.width,4);c.fillRect(o.ox-4,o.oy,4,o.rows*o.ch);c.fillRect(o.ox+o.cols*o.cw,o.oy,4,o.rows*o.ch);c.fillStyle='rgba(139,90,43,.3)';c.fillRect(0,o.oy,o.ox,o.rows*o.ch);c.fillStyle='rgba(139,90,43,.4)';for(let i=0;i<6;i++)c.fillRect(10,o.oy+20+60*i,30,40);c.fillStyle='rgba(139,90,43,.15)';c.fillRect(o.ox+o.cols*o.cw,o.oy,this.cv.width-o.ox-o.cols*o.cw,o.rows*o.ch)}
gridL(c){const o=C.grid;c.strokeStyle='rgba(255,255,255,.08)';c.lineWidth=1;for(let i=0;i<=o.cols;i++){const x=o.ox+i*o.cw;c.beginPath();c.moveTo(x,o.oy);c.lineTo(x,o.oy+o.rows*o.ch);c.stroke()};for(let i=0;i<=o.rows;i++){const y=o.oy+i*o.ch;c.beginPath();c.moveTo(o.ox,y);c.lineTo(o.ox+o.cols*o.cw,y);c.stroke()}}
prog(c){const o=C.grid,total=this.cfg.waves.length,cur=this.curWave;const bw=o.cols*o.cw-40,bh=6,bx=o.ox+20,by=o.oy+o.rows*o.ch+8;c.fillStyle='rgba(0,0,0,.4)';c.roundRect(bx,by,bw,bh,3);c.fill();const p=Math.min(cur/total,1);c.fillStyle='#4ade80';c.roundRect(bx,by,bw*p,bh,3);c.fill();c.fillStyle='rgba(255,255,255,.5)';c.font='10px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText('波次 '+Math.min(cur+1,total)+'/'+total,o.ox+o.cols*o.cw/2,by+3+bh/2)}
prev(c){if(!this.selPlant||this.mx<0||this.my<0)return;const o=C.grid,col=Math.floor((this.mx-o.ox)/o.cw),row=Math.floor((this.my-o.oy)/o.ch);if(row<0||row>=o.rows||col<0||col>=o.cols)return;const x=o.ox+col*o.cw,y=o.oy+row*o.ch,ok=this.grid[row][col]===null&&this.sunCount>=C.plants[this.selPlant].cost&&this.cds[this.selPlant]<=0;c.fillStyle=ok?'rgba(74,222,128,.2)':'rgba(248,113,113,.2)';c.fillRect(x,y,o.cw,o.ch);c.strokeStyle=ok?'rgba(74,222,128,.5)':'rgba(248,113,113,.5)';c.lineWidth=2;c.setLineDash([5,5]);c.strokeRect(x,y,o.cw,o.ch);c.setLineDash([])}
hit(c){for(const e of this.hitEff){const a=Math.min(e.t/500,.7);if(e.big){const r=e.color==='#a78bfa'?50:40;c.fillStyle=e.color+Math.floor(a*255).toString(16).padStart(2,'0');c.beginPath();c.arc(e.x,e.y,r*(1-e.t/500),0,Math.PI*2);c.fill();c.strokeStyle='rgba(255,255,255,'+(a*0.4)+')';c.lineWidth=3;c.beginPath();c.arc(e.x,e.y,r+10*(1-e.t/500),0,Math.PI*2);c.stroke()}else{c.fillStyle=e.color+Math.floor(a*200).toString(16).padStart(2,'0');c.beginPath();c.arc(e.x,e.y,12*(1-e.t/300),0,Math.PI*2);c.fill()}}}
notif(t){this.waveNotif={text:t,timer:2e3,alpha:0}}
nt(c){if(!this.waveNotif)return;const n=this.waveNotif;n.timer-=16.67;if(n.timer>1500)n.alpha=Math.min(n.alpha+.05,1);else if(n.timer>500)n.alpha=1;else n.alpha=Math.max(n.alpha-.05,0);if(n.timer<=0){this.waveNotif=null;return};c.save();c.globalAlpha=n.alpha;c.fillStyle='rgba(0,0,0,.6)';const tw=c.measureText(n.text).width;c.roundRect(this.cv.width/2-tw/2-30,this.cv.height/2-30,tw+60,60,12);c.fill();c.fillStyle='#fff';c.font='bold 22px "Microsoft YaHei","PingFang SC","Hiragino Sans GB",sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(n.text,this.cv.width/2,this.cv.height/2);c.restore()}
getPos(e){const r=this.cv.getBoundingClientRect(),sx=this.cv.width/r.width,sy=this.cv.height/r.height;const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;return{x:(cx-r.left)*sx,y:(cy-r.top)*sy}}
click(mx,my){if(this.state!=='playing')return;for(const s of this.suns){if(s.active&&!s.collecting&&s.contains(mx,my)){s.collecting=true;const el=document.querySelector('.sd'),rect=el.getBoundingClientRect(),cr=this.cv.getBoundingClientRect();s.cTarget={x:rect.left-cr.left+rect.width/2,y:rect.top-cr.top+rect.height/2};return}};for(const p of this.pfItems){if(p.active&&p.contains(mx,my)){this.pfCount++;this.pfActive=true;document.getElementById('pfc').textContent='1';p.active=false;return}};if(this.pfActive){const o=C.grid,col=Math.floor((mx-o.ox)/o.cw),row=Math.floor((my-o.oy)/o.ch);if(row>=0&&row<o.rows&&col>=0&&col<o.cols&&this.grid[row][col]!==null){const pl=this.grid[row][col];if(pl.type==='peashooter'||pl.type==='snowpea'||pl.type==='sunflower'){pl.boosted=C.pf.boostDur;this.pfActive=false;this.pfCount=0;document.getElementById('pfc').textContent='0';this.hitEff.push({x:pl.x,y:pl.y,t:400,color:'#a78bfa',big:true});return}}};if(!this.selPlant)return;const o=C.grid,col=Math.floor((mx-o.ox)/o.cw),row=Math.floor((my-o.oy)/o.ch);if(this.placePlant(this.selPlant,row,col)){this.selPlant=null;this.clrAct()}}
move(mx,my){this.mx=mx;this.my=my}
ui(){document.getElementById('sc2').textContent=this.sunCount;document.getElementById('wi').textContent=this.allDone?'最终波次':'第'+(this.curWave+1)+'/'+this.cfg.waves.length+'波';document.getElementById('zc').textContent=this.zwAlive}
cards(){document.querySelectorAll('.pc').forEach(card=>{const t=card.dataset.plant,c=parseInt(card.dataset.cost),aff=this.sunCount>=c,cl=this.cds[t]>0;card.classList.toggle('dis',!aff||cl);let el=card.querySelector('.co');if(cl){if(!el){el=document.createElement('div');el.className='co';card.appendChild(el)};el.textContent=Math.ceil(this.cds[t]/1e3)+'s';card.classList.add('oc')}else{if(el)el.remove();card.classList.remove('oc')}})}
selP(t){if(this.sunCount<C.plants[t].cost||this.cds[t]>0||this.state!=='playing')return;if(this.selPlant===t){this.selPlant=null;this.clrAct()}else{this.selPlant=t;this.clrAct();const el=document.querySelector('.pc[data-plant="'+t+'"]');if(el)el.classList.add('act')}}
clrAct(){document.querySelectorAll('.pc').forEach(c=>c.classList.remove('act'))}
pause(){if(this.state==='playing'){this.state='paused';this.overlay.classList.add('sh')}else if(this.state==='paused'){this.state='playing';this.overlay.classList.remove('sh')}}
spdTog(){this.spd=this.spd===1?2:1;document.getElementById('spb').textContent=this.spd+'×';document.getElementById('spb').classList.toggle('ac',this.spd===2)}
buildSel(avail){const el=document.getElementById('ps');el.innerHTML='';for(const t of avail){const d=C.plants[t];el.innerHTML+='<div class=pc data-plant='+t+' data-cost='+d.cost+'><div class=pi>'+d.icon+'</div><div class=pn>'+d.name+'</div><div class=pp>☀️'+d.cost+'</div></div>'};document.querySelectorAll('.pc').forEach(c=>c.addEventListener('click',()=>_g.selP(c.dataset.plant)))}}
function bl(){const el=document.getElementById('ll');el.innerHTML='';const p=JSON.parse(localStorage.getItem('pvz_progress')||'{}');C.levels.forEach((lv,i)=>{const ok=i===0||p['lv_'+i];const cls=ok?(i===0?'le':i===1?'lm':'lh'):'llk';const ic=ok?(lv.id===1?'🌱':lv.id===2?'🌳':'🏫'):'🔒';el.innerHTML+='<div class="lb '+cls+'" data-idx='+i+'><div class=li>'+ic+'</div><div class=li2><div class=ln>'+lv.name+'</div><div class=ld>'+lv.desc+'</div></div><div class=ldf>'+(ok?lv.diff:'未解锁')+'</div></div>'});document.querySelectorAll('.lb').forEach(el=>el.addEventListener('click',()=>{const i=parseInt(el.dataset.idx);const p2=JSON.parse(localStorage.getItem('pvz_progress')||'{}');if(i===0||p2['lv_'+i]){_s=i;sL()}}))}
let _g=null,_s=0;
document.addEventListener('DOMContentLoaded',()=>{_g=new Game();_g.init();document.getElementById('sb').addEventListener('click',()=>{document.getElementById('ss').classList.add('hidden');document.getElementById('sls').classList.remove('hidden');bl()});document.getElementById('bk').addEventListener('click',()=>{document.getElementById('sls').classList.add('hidden');document.getElementById('ss').classList.remove('hidden')});document.getElementById('nl').addEventListener('click',()=>{if(_s<C.levels.length-1){_s++;sL()}});document.getElementById('rw').addEventListener('click',sL);document.getElementById('rl').addEventListener('click',sL);document.getElementById('bl').addEventListener('click',()=>{document.getElementById('ws').classList.add('hidden');document.getElementById('sls').classList.remove('hidden');bl()});document.getElementById('bo').addEventListener('click',()=>{document.getElementById('ls').classList.add('hidden');document.getElementById('sls').classList.remove('hidden');bl()});
const cv=document.getElementById('cv');
function hd(e){e.preventDefault();const p=_g.getPos(e);if(e.type==='touchstart'||e.type==='click')_g.click(p.x,p.y);_g.move(p.x,p.y)}
cv.addEventListener('click',hd);cv.addEventListener('touchstart',hd,{passive:false});
cv.addEventListener('mousemove',e=>{const p=_g.getPos(e);_g.move(p.x,p.y)});
cv.addEventListener('touchmove',e=>{e.preventDefault();const p=_g.getPos(e);_g.move(p.x,p.y)},{passive:false});
cv.addEventListener('mouseleave',()=>{_g.mx=-1;_g.my=-1});
document.getElementById('pb').addEventListener('click',()=>_g.pause());document.getElementById('spb').addEventListener('click',()=>_g.spdTog());document.getElementById('rs').addEventListener('click',sL);document.addEventListener('keydown',e=>{if(e.key==='Escape'||e.key==='p'||e.key==='P')_g.pause()})});
function sL(){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById('gs2').classList.remove('hidden');_g.startLevel(_s)}
</script>
