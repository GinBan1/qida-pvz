<style>*,::after,::before{margin:0;padding:0;box-sizing:border-box}
:root{--bgp:#0a0e1a;--gb:rgba(255,255,255,.1);--gs:0 8px 32px rgba(0,0,0,.4);--t1:#fff;--t2:rgba(255,255,255,.7);--gn:#4ade80;--bu:#60a5fa;--re:#f87171;--sn:#fbbf24;--pu:#a78bfa}
html,body{width:100%;height:100%;overflow:hidden;font-family:"Microsoft YaHei","PingFang SC","Hiragino Sans GB",sans-serif;background:var(--bgp);color:var(--t1);user-select:none;-webkit-user-select:none}
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;transition:opacity .5s}
.screen.hidden{display:none}
#start-screen{background:linear-gradient(135deg,#0a0e1a,#1a1a2e 30%,#16213e 60%,#0f3460);background-size:400% 400%;animation:gs 8s ease infinite}
@keyframes gs{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.start-content,.select-content,.end-content{display:flex;flex-direction:column;align-items:center;gap:2rem;padding:3rem;background:var(--gb);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:24px;border:1px solid var(--gb);box-shadow:var(--gs);max-width:520px;width:90%;animation:fi .8s ease}
.select-content{gap:1.2rem}.end-content{max-width:400px;gap:1.5rem}
@keyframes fi{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.game-title{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#4ade80,#22c55e,#16a34a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;line-height:1.3;text-align:center}
.sub-title{font-size:.85rem;color:var(--t2);text-align:center;margin-top:.5rem;letter-spacing:4px}
.btn-glow{padding:1rem 3rem;font-size:1.25rem;font-weight:700;font-family:inherit;border:none;border-radius:16px;background:linear-gradient(135deg,var(--gn),#22c55e);color:#fff;cursor:pointer;transition:all .3s;box-shadow:0 0 20px rgba(74,222,128,.3);position:relative;overflow:hidden}
.btn-glow::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.1),transparent 60%);opacity:0;transition:opacity .3s}
.btn-glow:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 0 40px rgba(74,222,128,.5)}
.btn-glow:hover::before{opacity:1}
.btn-glow:active{transform:translateY(0) scale(.98)}
.btn-sm{padding:.6rem 1.5rem;font-size:.9rem}.btn-ghost{background:rgba(255,255,255,.1);box-shadow:none}
.zw{animation:zb 1.5s ease-in-out infinite;display:inline-block;font-size:2.5rem}
.zw.d1{animation-delay:.3s}.zw.d2{animation-delay:.6s}
@keyframes zb{0%,100%{transform:translateY(0)}25%{transform:translateY(-10px) rotate(-5deg)}75%{transform:translateY(-5px) rotate(5deg)}}
.sel-title{font-size:1.4rem;font-weight:700}
.level-list{display:flex;flex-direction:column;gap:.6rem;width:100%}
.level-btn{display:flex;align-items:center;gap:1rem;padding:.8rem 1.2rem;border-radius:14px;border:1px solid var(--gb);background:rgba(255,255,255,.04);cursor:pointer;transition:all .2s;text-align:left;width:100%;font-family:inherit;color:var(--t1)}
.level-btn:hover{background:rgba(255,255,255,.1);transform:translateX(4px)}
.level-btn .lvi{font-size:1.6rem}.level-btn .lvinfo{flex:1}.level-btn .lvname{font-size:1rem;font-weight:700}
.level-btn .lvdesc{font-size:.75rem;color:var(--t2);margin-top:2px}
.level-btn .lvdiff{font-size:.7rem;padding:2px 8px;border-radius:8px}
.lv-easy .lvdiff{background:rgba(74,222,128,.2);color:var(--gn)}
.lv-med .lvdiff{background:rgba(251,191,36,.2);color:#fbbf24}
.lv-hard .lvdiff{background:rgba(248,113,113,.2);color:var(--re)}
.lv-lock{opacity:.4;pointer-events:none}.lv-lock .lvdiff{background:rgba(255,255,255,.1);color:var(--t2)}
.end-content p{color:var(--t2)}.win-title{font-size:2.5rem;background:linear-gradient(135deg,#fbbf24,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lose-title{font-size:2rem;background:linear-gradient(135deg,#f87171,#ef4444,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#game-screen{display:flex;flex-direction:column;align-items:center;height:100vh;padding:.5rem;background:var(--bgp);gap:.5rem}#game-screen.hidden{display:none}
#top-bar{width:100%;max-width:960px;display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem;background:var(--gb);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:16px;border:1px solid var(--gb);box-shadow:var(--gs)}

.resource-bar{display:flex;gap:.5rem;align-items:center}
.ri{display:flex;align-items:center;gap:.3rem;padding:.3rem .6rem;background:rgba(0,0,0,.3);border-radius:10px;font-weight:600;font-size:.8rem}
.sd{color:var(--sn)}.wd{color:var(--bu)}.zd{color:var(--re)}.pd{color:var(--pu)}
#plant-selector{width:100%;max-width:960px;display:flex;gap:.3rem;padding:.5rem;background:var(--gb);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:16px;border:1px solid var(--gb);box-shadow:var(--gs);flex-wrap:wrap}
.plant-card{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:.4rem .2rem;background:rgba(255,255,255,.06);border-radius:10px;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative}
.plant-card:hover{background:rgba(255,255,255,.12);transform:translateY(-2px)}
.plant-card.active{border-color:var(--gn);background:rgba(74,222,128,.1);box-shadow:0 0 12px rgba(74,222,128,.2)}
.plant-card.disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.8)}
.plant-card.disabled:hover{background:rgba(255,255,255,.06);transform:none}
.pi{font-size:1.4rem;line-height:1}.plant-card:not(.disabled):hover .pi{transform:scale(1.15)}
.pn{font-size:.65rem;font-weight:600;color:var(--t2)}.pc{font-size:.6rem;font-weight:700;color:var(--sn)}
.cd-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);border-radius:8px;display:none;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--t1)}
.on-cd .cd-overlay{display:flex}
#game-container{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 0 30px rgba(0,0,0,.5);border:1px solid var(--gb);flex:1;max-width:960px;width:100%;display:flex;align-items:center;justify-content:center}
#game-canvas{display:block;width:100%;height:100%;max-width:900px;max-height:600px;image-rendering:pixelated}
#bottom-bar{width:100%;max-width:960px;display:flex;justify-content:center;gap:.5rem;padding:.4rem}
.ctrl-btn{padding:.4rem 1rem;font-size:.8rem;font-weight:600;font-family:inherit;border:none;border-radius:10px;background:rgba(255,255,255,.06);color:var(--t2);cursor:pointer;transition:all .2s;border:1px solid var(--gb)}
.ctrl-btn:hover{background:rgba(255,255,255,.12);color:var(--t1);transform:translateY(-1px)}
.ctrl-btn.active{background:rgba(74,222,128,.15);border-color:var(--gn);color:var(--gn)}
.pause-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:10;border-radius:16px}
.pause-overlay.show{display:flex}
.pause-text{font-size:2rem;font-weight:900;text-shadow:0 0 20px rgba(255,255,255,.3);animation:pp 1.5s ease-in-out infinite}
@keyframes pp{0%,100%{opacity:1}50%{opacity:.5}}
@media(max-width:768px){.game-title{font-size:1.4rem}.start-content,.select-content{padding:2rem 1.5rem;gap:1.5rem}.pi{font-size:1.1rem}.ri{font-size:.7rem;padding:.2rem .4rem}.btn-glow{padding:.8rem 2rem;font-size:1rem}}
</style>

<script>// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect)CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(r>w/2)r=w/2;if(r>h/2)r=h/2;this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);return this};

const C={grid:{rows:5,cols:9,cw:100,ch:120,ox:0,oy:0},startSun:50,sun:{skyInt:8e3,sfInt:8e3,val:50,fallSpd:1.5,life:8e3,size:28},pf:{dropInt:12e3,boostDur:5e3,val:1},mowerSpd:6,
plants:{
  sunflower:{name:'向日葵',cost:50,hp:100,cd:5e3,color:'#facc15',cat:'eco',icon:'🌻'},
  peashooter:{name:'豌豆射手',cost:100,hp:100,cd:5e3,si:1500,dmg:25,color:'#22c55e',cat:'shooter',icon:'🌱'},
  wallnut:{name:'坚果墙',cost:50,hp:400,cd:2e4,color:'#a16207',cat:'defense',icon:'🧱'},
  snowpea:{name:'寒冰射手',cost:175,hp:100,cd:5e3,si:1500,dmg:20,color:'#60a5fa',cat:'shooter',icon:'❄️'},
  cherrybomb:{name:'樱桃炸弹',cost:150,hp:1,cd:3e4,color:'#ef4444',cat:'instant',dmg:1800,icon:'🍒'},
  potatomine:{name:'土豆地雷',cost:25,hp:100,cd:2e4,color:'#92400e',cat:'mine',arm:15e3,icon:'🥔'}
},
zombies:{
  normal:{name:'普通僵尸',hp:100,spd:.4,dmg:50,rate:1e3,color:'#6b4c3b'},
  cone:{name:'路障僵尸',hp:200,spd:.4,dmg:50,rate:1e3,color:'#d97706'},
  bucket:{name:'铁桶僵尸',hp:500,spd:.3,dmg:50,rate:1e3,color:'#6b7280'},
  flag:{name:'旗帜僵尸',hp:100,spd:.6,dmg:50,rate:1e3,color:'#8b5cf6'},
  pole:{name:'撑杆跳僵尸',hp:150,spd:.7,dmg:50,rate:1e3,color:'#f97316'}
},
proj:{spd:4,size:8},

// 关卡配置
levels:[
  {id:1,name:'校园草坪',desc:'轻松的白天关卡，熟悉操作',diff:'简单',unlock:true,
   startSun:100,avail:['sunflower','peashooter','wallnut','cherrybomb'],
   skyInt:10e3,sfInt:10e3,waveDelay:4e3,
   waves:[
     [{t:'normal',r:2,d:0},{t:'normal',r:0,d:2500},{t:'normal',r:4,d:5e3}],
     [{t:'normal',r:1,d:0},{t:'normal',r:3,d:1500},{t:'flag',r:2,d:3e3},{t:'normal',r:0,d:5e3},{t:'normal',r:4,d:6e3}],
     [{t:'normal',r:0,d:0},{t:'normal',r:2,d:1e3},{t:'cone',r:4,d:2e3},{t:'flag',r:1,d:3e3},{t:'normal',r:3,d:4500},{t:'cone',r:2,d:6e3}],
     [{t:'normal',r:0,d:0},{t:'cone',r:1,d:1e3},{t:'normal',r:2,d:2e3},{t:'flag',r:3,d:3e3},{t:'cone',r:4,d:4e3},{t:'normal',r:0,d:5e3},{t:'normal',r:2,d:6e3},{t:'cone',r:4,d:7e3}]
   ]},
  {id:2,name:'林荫小道',desc:'僵尸种类增加，小心撑杆跳！',diff:'中等',
   startSun:75,avail:['sunflower','peashooter','wallnut','snowpea','cherrybomb','potatomine'],
   skyInt:9e3,sfInt:9e3,waveDelay:3e3,
   waves:[
     [{t:'normal',r:2,d:0},{t:'flag',r:0,d:2e3},{t:'cone',r:3,d:4e3},{t:'normal',r:1,d:5500},{t:'normal',r:4,d:7e3}],
     [{t:'cone',r:0,d:0},{t:'normal',r:2,d:1500},{t:'flag',r:4,d:3e3},{t:'pole',r:1,d:4500},{t:'normal',r:3,d:6e3},{t:'cone',r:2,d:8e3}],
     [{t:'flag',r:1,d:0},{t:'normal',r:0,d:1e3},{t:'cone',r:2,d:2e3},{t:'pole',r:4,d:3e3},{t:'normal',r:3,d:4e3},{t:'cone',r:1,d:5e3},{t:'pole',r:2,d:6500},{t:'normal',r:4,d:8e3}],
     [{t:'normal',r:0,d:0},{t:'cone',r:1,d:1e3},{t:'flag',r:2,d:2e3},{t:'pole',r:3,d:3e3},{t:'bucket',r:4,d:4e3},{t:'normal',r:0,d:5e3},{t:'cone',r:2,d:6e3},{t:'pole',r:4,d:7e3},{t:'flag',r:1,d:8500},{t:'normal',r:3,d:1e4}]
   ]},
  {id:3,name:'教学楼顶',desc:'终极挑战！全部僵尸登场',diff:'困难',
   startSun:50,avail:['sunflower','peashooter','wallnut','snowpea','cherrybomb','potatomine'],
   skyInt:7e3,sfInt:7e3,waveDelay:2500,
   waves:[
     [{t:'flag',r:2,d:0},{t:'cone',r:0,d:1500},{t:'normal',r:3,d:3e3},{t:'pole',r:1,d:4500},{t:'bucket',r:4,d:6e3},{t:'normal',r:2,d:8e3}],
     [{t:'pole',r:0,d:0},{t:'cone',r:2,d:1e3},{t:'flag',r:4,d:2e3},{t:'normal',r:1,d:3e3},{t:'bucket',r:3,d:4e3},{t:'pole',r:0,d:5e3},{t:'cone',r:4,d:6e3},{t:'flag',r:2,d:7500},{t:'bucket',r:1,d:9e3}],
     [{t:'flag',r:0,d:0},{t:'bucket',r:2,d:1e3},{t:'pole',r:4,d:2e3},{t:'cone',r:1,d:3e3},{t:'normal',r:3,d:4e3},{t:'flag',r:0,d:5e3},{t:'bucket',r:2,d:6e3},{t:'pole',r:4,d:7e3},{t:'cone',r:1,d:8e3},{t:'bucket',r:3,d:9e3},{t:'flag',r:2,d:10500}],
     [{t:'flag',r:1,d:0},{t:'bucket',r:0,d:1e3},{t:'pole',r:2,d:2e3},{t:'cone',r:3,d:3e3},{t:'bucket',r:4,d:4e3},{t:'flag',r:1,d:5e3},{t:'pole',r:0,d:6e3},{t:'bucket',r:2,d:7e3},{t:'cone',r:4,d:8e3},{t:'normal',r:3,d:9e3},{t:'flag',r:1,d:10500},{t:'bucket',r:2,d:12e3},{t:'pole',r:4,d:13e3}]
   ]}
]};

// ====== 实体类 ======

class Plant{
constructor(t,r,c){const d=C.plants[t];this.type=t;this.row=r;this.col=c;this.hp=d.hp;this.maxHp=d.hp;this.lastShoot=0;this.lastSun=0;this.af=0;this.at=0;this.boosted=0;this.armed=0;this.done=false}
get x(){return C.grid.ox+this.col*C.grid.cw+C.grid.cw/2}
get y(){return C.grid.oy+this.row*C.grid.ch+C.grid.ch/2}
update(dt,g){this.at+=dt;if(this.at>100){this.af=(this.af+1)%60;this.at=0};if(this.boosted>0)this.boosted=Math.max(0,this.boosted-dt);const d=C.plants[this.type];if(this.type==='sunflower'){if(g.time-this.lastSun>=g.cfg.sfInt){this.lastSun=g.time;g.suns.push(new Sun(this.x,this.y-40,0,g))}}else if(d.cat==='shooter'){const iv=this.boosted>0?d.si*0.5:d.si;if(g.zombies.some(z=>z.row===this.row&&z.x>this.x&&z.hp>0)&&g.time-this.lastShoot>=iv){this.lastShoot=g.time;g.projs.push(new Proj(this.x+20,this.y-4,this.row,this.type==='snowpea'))}}else if(this.type==='potatomine'&&!this.done){if(!this.armed)this.armed+=dt;else this.armed=Math.min(this.armed+dt,C.plants.potatomine.arm);if(this.armed>=C.plants.potatomine.arm){for(const z of g.zombies){if(z.row===this.row&&Math.abs(z.x-this.x)<C.grid.cw/2){z.takeDamage(1e4);this.done=true;g.hitEff.push({x:this.x,y:this.y,t:400,color:'#ef4444',big:true});return}}}}}
draw(c){if(this.done)return;const d=C.plants[this.type];c.save();const gr=c.createRadialGradient(this.x,this.y+15,2,this.x,this.y+15,25);gr.addColorStop(0,d.color+'40');gr.addColorStop(1,d.color+'00');c.fillStyle=gr;c.beginPath();c.arc(this.x,this.y+15,25,0,Math.PI*2);c.fill();const b=Math.sin(this.af*0.15)*2;this.drawBody(c,b,d);if(this.boosted>0){c.strokeStyle='#a78bfa';c.lineWidth=2;c.shadowColor='#a78bfa';c.shadowBlur=10;c.beginPath();c.arc(this.x,this.y,28,0,Math.PI*2);c.stroke();c.shadowBlur=0};c.restore();if(this.hp<this.maxHp&&this.type!=='cherrybomb'&&this.type!=='potatomine'){const bw=50,bh=5,bx=this.x-bw/2,by=this.y-45,r=this.hp/this.maxHp;c.fillStyle='rgba(0,0,0,.5)';c.roundRect(bx,by,bw,bh,3);c.fill();c.fillStyle=r>.5?'#4ade80':r>.25?'#fbbf24':'#f87171';c.roundRect(bx,by,bw*r,bh,3);c.fill()}}
drawBody(c,b,d){
if(this.type==='sunflower'){const sx=this.x,sy=this.y+b;c.strokeStyle='#4a7f2c';c.lineWidth=4;c.beginPath();c.moveTo(sx,sy+10);c.lineTo(sx,sy+35);c.stroke();c.fillStyle='#4a7f2c';c.beginPath();c.ellipse(sx-8,sy+22,8,4,-.3,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(sx+8,sy+28,8,4,.3,0,Math.PI*2);c.fill();for(let i=0;i<10;i++){const a=i/10*Math.PI*2;c.fillStyle=i%2===0?'#facc15':'#f59e0b';c.beginPath();c.ellipse(sx+Math.cos(a)*18,sy+Math.sin(a)*18,10,5,a,0,Math.PI*2);c.fill()};c.fillStyle='#92400e';c.beginPath();c.arc(sx,sy,10,0,Math.PI*2);c.fill();c.fillStyle='#78350f';c.beginPath();c.arc(sx-3,sy-3,3,0,Math.PI*2);c.fill();c.beginPath();c.arc(sx+4,sy+2,2.5,0,Math.PI*2);c.fill();c.beginPath();c.arc(sx+2,sy-4,2.5,0,Math.PI*2);c.fill()}

class Zombie{
constructor(t,r,g){const d=C.zombies[t];this.type=t;this.row=r;this.hp=d.hp;this.maxHp=d.hp;this.spd=d.spd;this.dmg=d.dmg;this.rate=d.rate;this.x=g.canvas.width+30;this.y=C.grid.oy+r*C.grid.ch+C.grid.ch/2;this.af=0;this.at=0;this.eat=false;this.lastEat=0;this.target=null;this.slowed=0;this.dead=false;this.jumped=false}
update(dt,g){if(this.hp<=0){this.dead=true;return};this.at+=dt;if(this.at>120){this.af=(this.af+1)%30;this.at=0};if(this.slowed>0)this.slowed=Math.max(0,this.slowed-dt);const sp=this.slowed>0?this.spd*0.5:this.spd;this.target=null;for(const p of g.plants){if(p.row===this.row&&p.hp>0&&p.type!=='cherrybomb'&&!p.done){const px=C.grid.ox+p.col*C.grid.cw+C.grid.cw/2;if(Math.abs(this.x-px)<50){this.target=p;break}}};if(this.target){if(this.type==='pole'&&!this.jumped){this.jumped=true;this.x=this.target.x+30;if(this.x>g.canvas.width-20)this.x=g.canvas.width-20;this.target=null;this.eat=false}else{this.eat=true;if(g.time-this.lastEat>=this.rate){this.lastEat=g.time;if(this.target.takeDamage(this.dmg)){g.removePlant(this.target);this.target=null;this.eat=false}}}}else{this.eat=false;this.x-=sp*(dt/16.67)};if(this.x<-20)g.lose()}
takeDamage(d){this.hp-=d;if(this.hp<=0){this.dead=true;return true}return false}
applySlow(d){this.slowed=Math.max(this.slowed,d)}
draw(c){if(this.dead)return;const zx=this.x,zy=this.y+(this.eat?2:0)-(this.slowed>0?2:0),wb=Math.sin(this.af*0.4)*3,bob=this.eat?0:wb;c.save();c.fillStyle=C.zombies[this.type].color;c.beginPath();c.ellipse(zx,zy+bob,18,25,0,0,Math.PI*2);c.fill();switch(this.type){case'cone':c.fillStyle='#d97706';c.beginPath();c.moveTo(zx,zy-30+bob);c.lineTo(zx-15,zy-5+bob);c.lineTo(zx+15,zy-5+bob);c.closePath();c.fill();c.strokeStyle='#b45309';c.lineWidth=2;c.stroke();break;case'bucket':c.fillStyle='#6b7280';c.fillRect(zx-18,zy-32+bob,36,30);c.fillStyle='#9ca3af';c.fillRect(zx-16,zy-30+bob,32,4);c.fillRect(zx-16,zy-18+bob,32,4);break;case'flag':c.fillStyle='#7c3aed';c.beginPath();c.moveTo(zx,zy-28+bob);c.lineTo(zx-3,zy-10+bob);c.lineTo(zx+12,zy-16+bob);c.closePath();c.fill();c.strokeStyle='#5b21b6';c.lineWidth=1;c.beginPath();c.moveTo(zx,zy-28+bob);c.lineTo(zx,zy-2+bob);c.stroke();break;case'pole':c.strokeStyle='#9a3412';c.lineWidth=3;c.beginPath();c.moveTo(zx-18,zy-20+bob);c.lineTo(zx+18,zy+20+bob);c.stroke();break;default:c.fillStyle='#4a3728';c.beginPath();c.arc(zx,zy-22+bob,14,Math.PI,0);c.fill()};c.fillStyle='#8B7355';c.beginPath();c.arc(zx,zy-5+bob,15,0,Math.PI*2);c.fill();c.fillStyle='#ef4444';c.shadowColor='#ef4444';c.shadowBlur=6;c.beginPath();c.arc(zx-6,zy-8+bob,3,0,Math.PI*2);c.fill();c.beginPath();c.arc(zx+6,zy-8+bob,3,0,Math.PI*2);c.fill();c.shadowBlur=0;c.fillStyle='#5c3d2e';c.beginPath();if(this.eat)c.arc(zx,zy+6+bob,5,0,Math.PI);else c.arc(zx,zy+4+bob,4,.1,Math.PI-.1);c.fill();c.strokeStyle='#8B7355';c.lineWidth=4;c.beginPath();c.moveTo(zx-18,zy+2+bob);c.lineTo(zx-28,zy+8+(this.eat?5:0)+bob);c.stroke();c.beginPath();c.moveTo(zx+18,zy+2+bob);c.lineTo(zx+28,zy+8+(this.eat?5:0)+bob);c.stroke();c.strokeStyle='#5c3d2e';c.lineWidth=5;const la=this.eat?0:Math.sin(this.af*0.4)*5;c.beginPath();c.moveTo(zx-6,zy+22+bob);c.lineTo(zx-6+la,zy+38+bob);c.stroke();c.beginPath();c.moveTo(zx+6,zy+22+bob);c.lineTo(zx+6-la,zy+38+bob);c.stroke();if(this.slowed>0){c.fillStyle='rgba(96,165,250,.3)';c.beginPath();c.arc(zx,zy+bob,40,0,Math.PI*2);c.fill();c.fillStyle='rgba(255,255,255,.3)';const ta=Date.now()*0.003;for(let i=0;i<3;i++){const a=ta+i*Math.PI*2/3;c.beginPath();c.arc(zx+Math.cos(a)*28,zy-10+bob+Math.sin(a)*15,2,0,Math.PI*2);c.fill()}};c.restore();if(this.hp<this.maxHp){const bw=40,bh=4,bx=zx-bw/2,by=zy-40+bob,r=this.hp/this.maxHp;c.fillStyle='rgba(0,0,0,.5)';c.fillRect(bx,by,bw,bh);c.fillStyle=r>.5?'#f87171':r>.25?'#fb923c':'#ef4444';c.fillRect(bx,by,bw*r,bh)}}}

class Proj{
constructor(x,y,r,s){this.x=x;this.y=y;this.row=r;this.snow=s;this.spd=C.proj.spd;this.sz=C.proj.size;this.active=true;this.trail=[]}
update(dt,g){this.x+=this.spd*(dt/16.67);this.trail.push({x:this.x,y:this.y,l:8});if(this.trail.length>5)this.trail.shift();this.trail=this.trail.filter(t=>{t.l-=dt/16.67;return t.l>0});for(const z of g.zombies){if(z.dead||z.row!==this.row)continue;if(Math.abs(this.x-z.x)<25){z.takeDamage(this.snow?C.plants.snowpea.dmg:C.plants.peashooter.dmg);if(this.snow)z.applySlow(3e3);this.active=false;g.hitEff.push({x:this.x,y:this.y,t:200,color:this.snow?'#93c5fd':'#4ade80'});break}};if(this.x>g.canvas.width+20)this.active=false}
draw(c){if(!this.active)return;for(const t of this.trail){const a=t.l/8;c.fillStyle=this.snow?'rgba(147,197,253,'+(a*0.3)+')':'rgba(34,197,94,'+(a*0.3)+')';c.beginPath();c.arc(t.x,t.y,this.sz*0.6*a,0,Math.PI*2);c.fill()};c.save();const g=c.createRadialGradient(this.x,this.y,1,this.x,this.y,this.sz);g.addColorStop(0,this.snow?'#fff':'#86efac');g.addColorStop(.5,this.snow?'#93c5fd':'#22c55e');g.addColorStop(1,this.snow?'#60a5fa':'#16a34a');c.fillStyle=g;c.shadowColor=this.snow?'#60a5fa':'#22c55e';c.shadowBlur=8;c.beginPath();c.arc(this.x,this.y,this.sz,0,Math.PI*2);c.fill();c.restore()}}

class Sun{
constructor(x,y,fs,g){this.x=x;this.y=fs?y:-30;this.targetY=y+(fs>0?80+Math.random()*60:0);this.val=C.sun.val;this.sz=C.sun.size;this.fall=C.sun.fallSpd;this.life=C.sun.life;this.born=g?g.time:0;this.fs=fs;this.collect=false;this.collecting=false;this.cTarget=null;this.cSpd=6;this.active=true;this.pulse=0}
update(dt,g){if(!this.active)return;if(this.collecting&&this.cTarget){const dx=this.cTarget.x-this.x,dy=this.cTarget.y-this.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<10){this.active=false;g.addSun(this.val);return};this.x+=dx/dist*this.cSpd*(dt/16.67);this.y+=dy/dist*this.cSpd*(dt/16.67);return};if(this.fs>0&&this.y<this.targetY){this.y+=this.fall*(dt/16.67);if(this.y>=this.targetY)this.y=this.targetY};if(g&&g.time-this.born>this.life)this.active=false;this.pulse+=dt*0.003}
draw(c){if(!this.active)return;c.save();const px=this.x,py=this.y,ps=Math.sin(this.pulse)*2;const g=c.createRadialGradient(px,py,2,px,py,this.sz+15+ps);g.addColorStop(0,'rgba(251,191,36,.6)');g.addColorStop(.5,'rgba(251,191,36,.2)');g.addColorStop(1,'rgba(251,191,36,0)');c.fillStyle=g;c.beginPath();c.arc(px,py,this.sz+15+ps,0,Math.PI*2);c.fill();const g2=c.createRadialGradient(px-5,py-5,2,px,py,this.sz+ps);g2.addColorStop(0,'#fef3c7');g2.addColorStop(.5,'#fbbf24');g2.addColorStop(1,'#f59e0b');c.fillStyle=g2;c.shadowColor='#fbbf24';c.shadowBlur=15;c.beginPath();c.arc(px,py,this.sz+ps,0,Math.PI*2);c.fill();c.shadowBlur=0;c.strokeStyle='rgba(251,191,36,.4)';c.lineWidth=2;for(let i=0;i<8;i++){const a=i/8*Math.PI*2+this.pulse;c.beginPath();c.moveTo(px+Math.cos(a)*(this.sz+5+ps),py+Math.sin(a)*(this.sz+5+ps));c.lineTo(px+Math.cos(a)*(this.sz+12+ps),py+Math.sin(a)*(this.sz+12+ps));c.stroke()};c.fillStyle='rgba(255,255,255,.4)';c.beginPath();c.arc(px-6,py-6,this.sz*0.3,0,Math.PI*2);c.fill();c.restore()}
contains(mx,my){const dx=this.x-mx,dy=this.y-my;return dx*dx+dy*dy<(this.sz+20)*(this.sz+20)}}

class PlantFood{
constructor(x,y){this.x=x;this.y=y;this.sz=14;this.active=true;this.pulse=0;this.targetY=y}
update(dt){if(!this.active)return;this.pulse+=dt*0.004}
draw(c){if(!this.active)return;c.save();const px=this.x,py=this.y,ps=Math.sin(this.pulse)*3;const g=c.createRadialGradient(px,py,2,px,py,this.sz+12+ps);g.addColorStop(0,'rgba(168,85,247,.5)');g.addColorStop(1,'rgba(168,85,247,0)');c.fillStyle=g;c.beginPath();c.arc(px,py,this.sz+12+ps,0,Math.PI*2);c.fill();const g2=c.createRadialGradient(px,py,2,px,py,this.sz+ps);g2.addColorStop(0,'#f3e8ff');g2.addColorStop(.5,'#a78bfa');g2.addColorStop(1,'#7c3aed');c.fillStyle=g2;c.shadowColor='#a78bfa';c.shadowBlur=20;c.beginPath();c.arc(px,py,this.sz+ps,0,Math.PI*2);c.fill();c.shadowBlur=0;c.fillStyle='rgba(255,255,255,.6)';c.beginPath();c.arc(px-4,py-4,4,0,Math.PI*2);c.fill();c.fillStyle='#fff';c.font='bold 12px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText('✨',px,py+2);c.restore()}
contains(mx,my){return(Math.abs(this.x-mx)<this.sz+16)&&(Math.abs(this.y-my)<this.sz+16)}}

class Mower{
constructor(row){this.row=row;this.active=true;this.triggered=false;this.x=0;this.y=C.grid.oy+row*C.grid.ch+C.grid.ch/2;this.spd=C.mowerSpd}
update(dt,g){if(!this.triggered)return;this.x+=this.spd*(dt/16.67);for(const z of g.zombies){if(z.row===this.row&&!z.dead&&Math.abs(z.x-this.x)<30)z.takeDamage(1e4)};if(this.x>g.canvas.width+50)this.active=false}
draw(c){if(!this.active)return;c.save();const mx=this.triggered?this.x:0,my=this.y;c.fillStyle='#78716c';c.roundRect(mx-16,my-14,32,28,6);c.fill();c.fillStyle='#44403c';c.beginPath();c.arc(mx,my+10,12,0,Math.PI,0);c.fill();c.fillStyle='#a8a29e';c.fillRect(mx-2,my-12,4,8);c.fillStyle='#ef4444';c.beginPath();c.arc(mx,my-16,8,0,Math.PI*2);c.fill();if(this.triggered){c.fillStyle='rgba(255,255,255,.3)';c.beginPath();c.arc(mx,my-16,14,0,Math.PI*2);c.fill()};c.restore()}
checkTrigger(zombies){if(this.triggered)return;for(const z of zombies){if(z.row===this.row&&!z.dead&&z.x<30){this.triggered=true;return true}};return false}}

class Game{
constructor(){this.canvas=document.getElementById('game-canvas');this.ctx=this.canvas.getContext('2d');this.state='menu';this.reset()}
reset(){this.time=0;this.spd=1;this.sunCount=0;this.curWave=0;this.waveAct=false;this.waveTim=0;this.allDone=false;this.zwAlive=0;this.plants=[];this.zombies=[];this.projs=[];this.suns=[];this.pfItems=[];this.mowers=[];this.hitEff=[];this.pfCount=0;this.pfActive=false;this.grid=Array.from({length:C.grid.rows},()=>Array(C.grid.cols).fill(null));this.selPlant=null;this.cds={};this.skySunTim=0;this.pfTim=0;this.mx=-1;this.my=-1;this.lastF=0;this.reqId=null;this.waveNotif=null;this.cfg=null;this.curLevel=0;this.overlay=null}
init(){const tw=C.grid.cols*C.grid.cw,th=C.grid.rows*C.grid.ch;C.grid.ox=(this.canvas.width-tw)/2;C.grid.oy=(this.canvas.height-th)/2;this.overlay=document.createElement('div');this.overlay.className='pause-overlay';this.overlay.innerHTML='<span class=pause-text>⏸️ 已暂停</span>';document.getElementById('game-container').appendChild(this.overlay)}
startLevel(lvIdx){this.reset();this.curLevel=lvIdx;const lv=C.levels[lvIdx];this.cfg=lv;this.state='playing';this.sunCount=lv.startSun;this.time=0;this.curWave=0;this.allDone=false;this.zwAlive=0;this.skySunTim=3e3;this.pfTim=0;this.pfCount=0;this.pfActive=false;this.mowers=[];for(let r=0;r<C.grid.rows;r++)this.mowers.push(new Mower(r));buildSelector(lv.avail);this.cds={};const pl=Object.keys(C.plants);for(const k of pl)this.cds[k]=0;this.waveTim=lv.waveDelay;document.getElementById('level-name').textContent='🌻'+lv.name;document.getElementById('pf-display').style.display=lvIdx>0?'flex':'none';this.updateUI();this.clearActive();if(this.reqId)cancelAnimationFrame(this.reqId);this.lastF=performance.now();this.loop(this.lastF)}
loop(ts){if(this.state==='menu')return;const dt=Math.min(ts-this.lastF,50);this.lastF=ts;if(this.state==='playing')this.update(dt*this.spd);this.render();this.reqId=requestAnimationFrame(t=>this.loop(t))}
update(dt){this.time+=dt;this.updateWaves(dt);this.skySunTim+=dt;if(this.skySunTim>=this.cfg.skyInt){this.skySunTim=0;this.spawnSkySun()};this.pfTim+=dt;if(this.pfTim>=C.pf.dropInt&&this.curLevel>0){this.pfTim=0;this.spawnPF()};for(const p of this.plants)p.update(dt,this);for(const p of this.projs)p.update(dt,this);this.projs=this.projs.filter(p=>p.active);for(const z of this.zombies)z.update(dt,this);this.zombies=this.zombies.filter(z=>!z.dead);for(const s of this.suns)s.update(dt,this);this.suns=this.suns.filter(s=>s.active);for(const p of this.pfItems)p.update(dt);this.pfItems=this.pfItems.filter(p=>p.active);for(const m of this.mowers){m.checkTrigger(this.zombies);m.update(dt,this)};this.mowers=this.mowers.filter(m=>m.active);for(const e of this.hitEff)e.t-=dt;this.hitEff=this.hitEff.filter(e=>e.t>0);for(const k in this.cds){if(this.cds[k]>0){this.cds[k]-=dt;if(this.cds[k]<0)this.cds[k]=0}};this.zwAlive=this.zombies.length;if(this.allDone&&this.zwAlive===0)this.win();this.updateUI();this.updateCards()}
updateWaves(dt){if(this.allDone)return;if(!this.waveAct){this.waveTim-=dt;if(this.waveTim<=0)this.startWave();return};const w=this.cfg.waves[this.curWave];let all=true;for(const zd of w){if(!zd._s){all=false;if(this.waveTim>=zd.d){this.spawnZ(zd.t,zd.r);zd._s=true}}};this.waveTim+=dt;if(all&&this.zwAlive===0){this.waveAct=false;this.curWave++;if(this.curWave>=this.cfg.waves.length)this.allDone=true;else this.waveTim=this.cfg.waveDelay}}
startWave(){if(this.curWave>=this.cfg.waves.length)return;this.waveAct=true;this.waveTim=0;for(const zd of this.cfg.waves[this.curWave])zd._s=false;this.showNotif('🌊 第'+(this.curWave+1)+'波 来袭！')}
spawnZ(t,r){this.zombies.push(new Zombie(t,r,this))}
spawnSkySun(){const col=Math.floor(Math.random()*C.grid.cols);this.suns.push(new Sun(C.grid.ox+col*C.grid.cw+C.grid.cw/2+(Math.random()-.5)*60,-20,1,this))}
spawnPF(){const col=Math.floor(Math.random()*C.grid.cols);const x=C.grid.ox+col*C.grid.cw+C.grid.cw/2;const pf=new PlantFood(x,C.grid.oy-20);pf.targetY=C.grid.oy+Math.random()*C.grid.rows*C.grid.ch;this.pfItems.push(pf)}
placePlant(t,r,c){if(!C.plants[t])return false;const d=C.plants[t];if(this.sunCount<d.cost||this.cds[t]>0||this.grid[r][c]!==null)return false;if(this.pfActive&&(t==='peashooter'||t==='snowpea'||t==='sunflower')){this.pfActive=false;const p=new Plant(t,r,c);p.boosted=C.pf.boostDur;this.plants.push(p);this.grid[r][c]=p;this.hitEff.push({x:p.x,y:p.y,t:400,color:'#a78bfa',big:true});document.getElementById('pf-count').textContent='0';this.updateCards();return true};if(d.cat==='instant'&&t==='cherrybomb'){if(this.sunCount<d.cost)return false;this.sunCount-=d.cost;this.cds[t]=d.cd;this.explodeCherry(r,c);return true};this.sunCount-=d.cost;const p=new Plant(t,r,c);this.plants.push(p);this.grid[r][c]=p;this.cds[t]=d.cd;this.hitEff.push({x:p.x,y:p.y,t:300,color:d.color});return true}
explodeCherry(r,c){const cx=C.grid.ox+c*C.grid.cw+C.grid.cw/2,cy=C.grid.oy+r*C.grid.ch+C.grid.ch/2;this.hitEff.push({x:cx,y:cy,t:500,color:'#ef4444',big:true});this.hitEff.push({x:cx-50,y:cy-50,t:300,color:'#f97316'});this.hitEff.push({x:cx+50,y:cy-50,t:300,color:'#f97316'});this.hitEff.push({x:cx-50,y:cy+50,t:300,color:'#f97316'});this.hitEff.push({x:cx+50,y:cy+50,t:300,color:'#f97316'});for(let dr=-1;dr<=1;dr++){for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr<0||nr>=C.grid.rows||nc<0||nc>=C.grid.cols)continue;for(const z of this.zombies)if(z.row===nr&&!z.dead)z.takeDamage(1e4)}}}
removePlant(p){const i=this.plants.indexOf(p);if(i!==-1){this.plants.splice(i,1);this.grid[p.row][p.col]=null}}
addSun(a){this.sunCount+=a;this.updateUI()}
collectPF(){this.pfCount++;this.pfActive=true;document.getElementById('pf-count').textContent='1'}
lose(){this.state='lose';this.overlay.classList.remove('show');document.getElementById('game-screen').classList.add('hidden');document.getElementById('lose-screen').classList.remove('hidden')}
win(){setTimeout(()=>{this.state='win';this.overlay.classList.remove('show');document.getElementById('game-screen').classList.add('hidden');document.getElementById('win-screen').classList.remove('hidden');document.getElementById('win-msg').textContent=C.levels[this.curLevel].name+' 通关！';document.getElementById('next-level-btn').style.display=this.curLevel<C.levels.length-1?'inline-block':'none';if(this.curLevel<C.levels.length-1)unlockLv(this.curLevel+1)},1500)}
render(){const c=this.ctx,{width,height}=this.canvas;c.clearRect(0,0,width,height);this.drawLawn(c);this.drawGrid(c);this.drawProgress(c);this.drawPlace(c);for(const m of this.mowers)m.draw(c);for(const p of this.plants)p.draw(c);for(const p of this.projs)p.draw(c);for(const z of this.zombies)z.draw(c);for(const s of this.suns)s.draw(c);for(const p of this.pfItems)p.draw(c);this.drawHit(c);this.drawNotif(c)}
drawLawn(c){const o=C.grid;const bg=c.createLinearGradient(0,0,0,this.canvas.height);bg.addColorStop(0,'#2d5016');bg.addColorStop(.5,'#3a6b1e');bg.addColorStop(1,'#2d5016');c.fillStyle=bg;c.fillRect(0,0,this.canvas.width,this.canvas.height);for(let r=0;r<o.rows;r++){for(let c2=0;c2<o.cols;c2++){const x=o.ox+c2*o.cw,y=o.oy+r*o.ch,lt=(r+c2)%2===0;c.fillStyle=lt?'#4a8f2c':'#3f7e25';c.fillRect(x,y,o.cw,o.ch);c.fillStyle=lt?'rgba(255,255,255,.03)':'rgba(0,0,0,.03)';const sd=(r*7+c2*11)%5;for(let i=0;i<sd;i++)c.beginPath(),c.arc(x+15+(i*23+r*7)%(o.cw-30),y+15+(i*17+c2*11)%(o.ch-30),2,0,Math.PI*2),c.fill()}};c.fillStyle='#5c4033';c.fillRect(0,o.oy-4,this.canvas.width,4);c.fillRect(0,o.oy+o.rows*o.ch,this.canvas.width,4);c.fillRect(o.ox-4,o.oy,4,o.rows*o.ch);c.fillRect(o.ox+o.cols*o.cw,o.oy,4,o.rows*o.ch);c.fillStyle='rgba(139,90,43,.3)';c.fillRect(0,o.oy,o.ox,o.rows*o.ch);c.fillStyle='rgba(139,90,43,.4)';for(let i=0;i<6;i++)c.fillRect(10,o.oy+20+60*i,30,40);c.fillStyle='rgba(139,90,43,.15)';c.fillRect(o.ox+o.cols*o.cw,o.oy,this.canvas.width-o.ox-o.cols*o.cw,o.rows*o.ch)}
drawGrid(c){const o=C.grid;c.strokeStyle='rgba(255,255,255,.08)';c.lineWidth=1;for(let i=0;i<=o.cols;i++){const x=o.ox+i*o.cw;c.beginPath();c.moveTo(x,o.oy);c.lineTo(x,o.oy+o.rows*o.ch);c.stroke()};for(let i=0;i<=o.rows;i++){const y=o.oy+i*o.ch;c.beginPath();c.moveTo(o.ox,y);c.lineTo(o.ox+o.cols*o.cw,y);c.stroke()}}
drawProgress(c){const o=C.grid;const total=this.cfg.waves.length,cur=this.curWave;const bw=o.cols*o.cw-40,bh=6,bx=o.ox+20,by=o.oy+o.rows*o.ch+8;c.fillStyle='rgba(0,0,0,.4)';c.roundRect(bx,by,bw,bh,3);c.fill();const p=Math.min(cur/total,1);c.fillStyle='#4ade80';c.roundRect(bx,by,bw*p,bh,3);c.fill();c.fillStyle='rgba(255,255,255,.5)';c.font='10px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText('波次 '+Math.min(cur+1,total)+'/'+total,o.ox+o.cols*o.cw/2,by+3+bh/2)}
drawPlace(c){if(!this.selPlant||this.mx<0||this.my<0)return;const o=C.grid,col=Math.floor((this.mx-o.ox)/o.cw),row=Math.floor((this.my-o.oy)/o.ch);if(row<0||row>=o.rows||col<0||col>=o.cols)return;const x=o.ox+col*o.cw,y=o.oy+row*o.ch,ok=this.grid[row][col]===null&&this.sunCount>=C.plants[this.selPlant].cost&&this.cds[this.selPlant]<=0;c.fillStyle=ok?'rgba(74,222,128,.2)':'rgba(248,113,113,.2)';c.fillRect(x,y,o.cw,o.ch);c.strokeStyle=ok?'rgba(74,222,128,.5)':'rgba(248,113,113,.5)';c.lineWidth=2;c.setLineDash([5,5]);c.strokeRect(x,y,o.cw,o.ch);c.setLineDash([])}
drawHit(c){for(const e of this.hitEff){const a=Math.min(e.t/500,.7);if(e.big){const r=e.color==='#a78bfa'?50:40;c.fillStyle=e.color+Math.floor(a*255).toString(16).padStart(2,'0');c.beginPath();c.arc(e.x,e.y,r*(1-e.t/500),0,Math.PI*2);c.fill();c.strokeStyle='rgba(255,255,255,'+(a*0.4)+')';c.lineWidth=3;c.beginPath();c.arc(e.x,e.y,r+10*(1-e.t/500),0,Math.PI*2);c.stroke()}else{c.fillStyle=e.color+Math.floor(a*200).toString(16).padStart(2,'0');c.beginPath();c.arc(e.x,e.y,12*(1-e.t/300),0,Math.PI*2);c.fill()}}}
showNotif(t){this.waveNotif={text:t,timer:2e3,alpha:0}}
drawNotif(c){if(!this.waveNotif)return;const n=this.waveNotif;n.timer-=16.67;if(n.timer>1500)n.alpha=Math.min(n.alpha+.05,1);else if(n.timer>500)n.alpha=1;else n.alpha=Math.max(n.alpha-.05,0);if(n.timer<=0){this.waveNotif=null;return};c.save();c.globalAlpha=n.alpha;c.fillStyle='rgba(0,0,0,.6)';const tw=c.measureText(n.text).width;c.roundRect(this.canvas.width/2-tw/2-30,this.canvas.height/2-30,tw+60,60,12);c.fill();c.fillStyle='#fff';c.font='bold 22px "Microsoft YaHei","PingFang SC","Hiragino Sans GB",sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(n.text,this.canvas.width/2,this.canvas.height/2);c.restore()}
handleClick(mx,my){if(this.state!=='playing')return;for(const s of this.suns){if(s.active&&!s.collecting&&s.contains(mx,my)){s.collecting=true;const el=document.querySelector('.sd'),rect=el.getBoundingClientRect(),cr=this.canvas.getBoundingClientRect();s.cTarget={x:rect.left-cr.left+rect.width/2,y:rect.top-cr.top+rect.height/2};return}};for(const p of this.pfItems){if(p.active&&p.contains(mx,my)){this.collectPF();p.active=false;return}};if(this.pfActive){const o=C.grid,col=Math.floor((mx-o.ox)/o.cw),row=Math.floor((my-o.oy)/o.ch);if(row>=0&&row<o.rows&&col>=0&&col<o.cols&&this.grid[row][col]!==null){const pl=this.grid[row][col];if(pl.type==='peashooter'||pl.type==='snowpea'||pl.type==='sunflower'){pl.boosted=C.pf.boostDur;this.pfActive=false;this.pfCount=0;document.getElementById('pf-count').textContent='0';this.hitEff.push({x:pl.x,y:pl.y,t:400,color:'#a78bfa',big:true});return}}};if(!this.selPlant)return;const o=C.grid,col=Math.floor((mx-o.ox)/o.cw),row=Math.floor((my-o.oy)/o.ch);if(this.placePlant(this.selPlant,row,col)){this.selPlant=null;this.clearActive()}}
handleMove(mx,my){this.mx=mx;this.my=my}
updateUI(){document.getElementById('sun-count').textContent=this.sunCount;document.getElementById('wave-info').textContent=this.allDone?'最终波次':'第'+(this.curWave+1)+'/'+this.cfg.waves.length+'波';document.getElementById('zombie-count').textContent=this.zwAlive}
updateCards(){document.querySelectorAll('.plant-card').forEach(card=>{const t=card.dataset.plant,c=parseInt(card.dataset.cost),aff=this.sunCount>=c,cl=this.cds[t]>0;card.classList.toggle('disabled',!aff||cl);let el=card.querySelector('.cd-overlay');if(cl){if(!el){el=document.createElement('div');el.className='cd-overlay';card.appendChild(el)};el.textContent=Math.ceil(this.cds[t]/1e3)+'s';card.classList.add('on-cd')}else{if(el)el.remove();card.classList.remove('on-cd')}})}
setSelPlant(t){if(this.sunCount<C.plants[t].cost||this.cds[t]>0||this.state!=='playing')return;if(this.selPlant===t){this.selPlant=null;this.clearActive()}else{this.selPlant=t;this.clearActive();const el=document.querySelector('.plant-card[data-plant="'+t+'"]');if(el)el.classList.add('active')}}
clearActive(){document.querySelectorAll('.plant-card').forEach(c=>c.classList.remove('active'))}
togglePause(){if(this.state==='playing'){this.state='paused';this.overlay.classList.add('show')}else if(this.state==='paused'){this.state='playing';this.overlay.classList.remove('show')}}
toggleSpeed(){this.spd=this.spd===1?2:1;document.getElementById('speed-btn').textContent=this.spd+'×';document.getElementById('speed-btn').classList.toggle('active',this.spd===2)}
}

// ====== UI 管理 ======
let _g=null;
let _selLv=0;

function buildSelector(avail){
const el=document.getElementById('plant-selector');el.innerHTML='';
for(const t of avail){const d=C.plants[t];
el.innerHTML+='<div class=plant-card data-plant='+t+' data-cost='+d.cost+'><div class=pi>'+d.icon+'</div><div class=pn>'+d.name+'</div><div class=pc>☀️'+d.cost+'</div></div>'}
document.querySelectorAll('.plant-card').forEach(c=>c.addEventListener('click',()=>_g.setSelPlant(c.dataset.plant)))}

function buildLevelList(){
const el=document.getElementById('level-list');el.innerHTML='';
const prog=JSON.parse(localStorage.getItem('pvz_progress')||'{}');
C.levels.forEach((lv,i)=>{const ok=i===0||prog['lv_'+i];
const cls=ok?(i===0?'lv-easy':i===1?'lv-med':'lv-hard'):'lv-lock';
const ic=ok?(lv.id===1?'🌱':lv.id===2?'🌳':'🏫'):'🔒';
el.innerHTML+='<div class="level-btn '+cls+'" data-idx='+i+'><div class=lvi>'+ic+'</div><div class=lvinfo><div class=lvname>'+lv.name+'</div><div class=lvdesc>'+lv.desc+'</div></div><div class=lvdiff>'+(ok?lv.diff:'未解锁')+'</div></div>'});
document.querySelectorAll('.level-btn').forEach(el=>el.addEventListener('click',()=>{const i=parseInt(el.dataset.idx);const p=JSON.parse(localStorage.getItem('pvz_progress')||'{}');if(i===0||p['lv_'+i]){_selLv=i;startLevel()}}))}

function unlockLv(idx){
const data=JSON.parse(localStorage.getItem('pvz_progress')||'{}');
data['lv_'+idx]=true;localStorage.setItem('pvz_progress',JSON.stringify(data))}

document.addEventListener('DOMContentLoaded',()=>{
_g=new Game();_g.init();
document.getElementById('sb').addEventListener('click',()=>{document.getElementById('ss').classList.add('hidden');document.getElementById('sls').classList.remove('hidden');buildLevelList()});
document.getElementById('bk').addEventListener('click',()=>{document.getElementById('sls').classList.add('hidden');document.getElementById('ss').classList.remove('hidden')});
document.getElementById('nl').addEventListener('click',()=>{if(_selLv<C.levels.length-1){_selLv++;startLevel()}});
document.getElementById('rw').addEventListener('click',startLevel);
document.getElementById('rl').addEventListener('click',startLevel);
document.getElementById('bl').addEventListener('click',()=>{document.getElementById('ws').classList.add('hidden');document.getElementById('sls').classList.remove('hidden');buildLevelList()});
document.getElementById('bo').addEventListener('click',()=>{document.getElementById('ls').classList.add('hidden');document.getElementById('sls').classList.remove('hidden');buildLevelList()});
const cv=document.getElementById('cv');
cv.addEventListener('click',e=>{const r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height;_g.handleClick((e.clientX-r.left)*sx,(e.clientY-r.top)*sy)});
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height;_g.handleMove((e.clientX-r.left)*sx,(e.clientY-r.top)*sy)});
cv.addEventListener('mouseleave',()=>{_g.mx=-1;_g.my=-1});
document.getElementById('pb').addEventListener('click',function(){if(_g)_g.pause()});
document.getElementById('spb').addEventListener('click',function(){if(_g)_g.spdTog()});
document.getElementById('rs').addEventListener('click',startLevel);
document.addEventListener('keydown',e=>{if(e.key==='Escape'||e.key==='p'||e.key==='P')if(_g)_g.pause()})});

function startLevel(){
document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
const gs2=document.getElementById('gs2');
if(gs2)gs2.classList.remove('hidden');
if(_g)_g.startLevel(_selLv)}

</script>
</body>
</html>
